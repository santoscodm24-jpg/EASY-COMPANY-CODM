<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE MANDO | ADMIN</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --green: #00ff41; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: #111; border: 2px solid var(--gold); padding: 25px; width: 100%; max-width: 700px; border-radius: 8px; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        section { border-top: 1px solid #333; margin-top: 20px; padding-top: 15px; }
        label { display: block; color: var(--gold); font-size: 0.8rem; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #000; border: 1px solid #444; color: var(--green); box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        #out-box { margin-top: 20px; display: none; }
        pre { background: #000; color: var(--green); padding: 15px; border: 1px dashed var(--gold); white-space: pre-wrap; font-size: 0.8rem; }
        #lock { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="lock">
        <div class="panel" style="max-width:300px; text-align:center;">
            <h2>ACCESO</h2>
            <input type="password" id="pass" placeholder="CLAVE">
            <button onclick="auth()">ENTRAR</button>
        </div>
    </div>

    <div class="panel">
        <h2>CENTRO DE CONFIGURACIÓN TÁCTICA</h2>
        
        <section>
            <label>LINK NOTICIAS OFICIALES CODM</label>
            <input type="text" id="n_url" value="https://www.callofduty.com/mobile">
        </section>

        <section>
            <label>TORNEOS PRIVADOS</label>
            <input type="text" id="t_tit" placeholder="Nombre del Torneo">
            <select id="t_costo">
                <option value="FREE">GRATIS (FREE)</option>
                <option value="1.5$">1.5$ USD</option>
            </select>
            <textarea id="t_det" placeholder="ID, Fecha, Hora..."></textarea>
        </section>

        <section>
            <label>HALL DE FAMA (Nombres y Fotos separados por comas)</label>
            <input type="text" id="hf_n" placeholder="Jugador1, Jugador2">
            <input type="text" id="hf_f" placeholder="URL_Foto1, URL_Foto2">
        </section>

        <section>
            <label>REDES Y CONTACTO</label>
            <input type="text" id="tk" placeholder="URL TikTok">
            <input type="text" id="ws" placeholder="WhatsApp (Ej: 58412...)">
        </section>

        <button onclick="generar()">GENERAR DATA.JSON</button>

        <div id="out-box">
            <h3 style="color:var(--gold)">COPIA ESTE CÓDIGO EN DATA.JSON:</h3>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        function auth() { if(document.getElementById('pass').value === 'EASY2026') document.getElementById('lock').style.display='none'; }
        function generar() {
            const nombres = document.getElementById('hf_n').value.split(',');
            const fotos = document.getElementById('hf_f').value.split(',');
            const hall = nombres.map((n, i) => ({ nombre: n.trim(), foto: fotos[i] ? fotos[i].trim() : "" }));

            const data = {
                noticias_url: document.getElementById('n_url').value,
                torneo: { 
                    titulo: document.getElementById('t_tit').value, 
                    costo: document.getElementById('t_costo').value,
                    detalles: document.getElementById('t_det').value 
                },
                hall_fama: hall,
                tiktok_url: document.getElementById('tk').value,
                whatsapp: document.getElementById('ws').value.replace(/\D/g,'')
            };
            document.getElementById('output').textContent = JSON.stringify(data, null, 4);
            document.getElementById('out-box').style.display = 'block';
        }
    </script>
</body>
</html>

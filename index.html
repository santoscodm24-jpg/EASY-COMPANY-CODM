<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY COMPANY | HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; }
        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.7), var(--bg)), url('https://wallpaperaccess.com/full/2105128.jpg') center/cover; border-bottom: 3px solid var(--gold); }
        h1 { font-family: 'Black Ops One', cursive; color: var(--gold); font-size: 3rem; margin: 0; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .section { background: var(--card); border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 30px; border-top: 3px solid var(--gold); }
        .hall-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        .player { text-align: center; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .player img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .btn-ws { display: block; background: var(--gold); color: black; padding: 15px; text-align: center; text-decoration: none; font-weight: bold; font-family: 'Black Ops One'; border-radius: 5px; }
    </style>
</head>
<body>

    <header><h1>EASY COMPANY</h1></header>

    <main class="container">
        <div id="noticia" class="section"></div>
        <div id="sala" class="section" style="text-align:center; border-style: dashed;"></div>
        <h2 style="font-family:'Black Ops One'; color:var(--gold);">HALL DE LA FAMA</h2>
        <div id="hall" class="hall-grid"></div>
        <br>
        <a id="ws" href="#" class="btn-ws">CONTACTAR AL CLAN</a>
    </main>

    <script>
        async function load() {
            const r = await fetch('data.json?v=' + Date.now());
            const d = await r.json();
            
            document.getElementById('noticia').innerHTML = `<h3>${d.estrenos.titulo}</h3><p>${d.estrenos.descripcion}</p>`;
            document.getElementById('sala').innerHTML = `<h3 style="color:var(--gold)">${d.sala.titulo}</h3><p>${d.sala.info}</p>`;
            document.getElementById('hall').innerHTML = d.hall_fama.map(p => `<div class="player"><img src="${p.foto}"><div style="font-size:0.8rem; margin-top:5px; color:var(--gold)">${p.nombre}</div></div>`).join('');
            document.getElementById('ws').href = "https://wa.me/" + d.config.whatsapp;
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY COMPANY | HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: #111; --text: #eee; }
        body { margin: 0; background: var(--dark); color: var(--text); font-family: 'Roboto', sans-serif; background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), var(--dark)), url('https://wallpaperaccess.com/full/2105128.jpg') center/cover; border-bottom: 3px solid var(--gold); }
        h1 { font-family: 'Black Ops One', cursive; color: var(--gold); font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; }
        nav { background: #000; padding: 15px; position: sticky; top: 0; border-bottom: 2px solid var(--gold); display: flex; justify-content: center; gap: 20px; z-index: 100; }
        nav a { color: white; text-decoration: none; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-family: 'Black Ops One', cursive; color: var(--gold); border-left: 5px solid var(--gold); padding-left: 15px; margin-bottom: 30px; }
        
        /* Estilos Dinámicos */
        .card-sala { background: #0a0a0a; border: 1px dashed var(--gold); padding: 40px; text-align: center; }
        .info-acceso { font-family: monospace; background: #000; color: #00ff41; padding: 10px; display: inline-block; margin: 15px 0; border: 1px solid #222; }
        .grid-hall { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; }
        .player-card { background: #0e0e0e; border: 1px solid #222; padding: 15px; text-align: center; border-radius: 4px; }
        .player-card img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .btn-ws { display: inline-block; background: var(--gold); color: black; padding: 15px 30px; font-weight: bold; text-decoration: none; font-family: 'Black Ops One'; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>EASY COMPANY</h1>
        <p style="color: #666; letter-spacing: 5px;">CUARTEL GENERAL</p>
    </header>

    <nav>
        <a href="#estrenos">NOTICIAS</a>
        <a href="#sala-seccion">SALA ACTUAL</a>
        <a href="#hall-fama">LEYENDAS</a>
    </nav>

    <main class="container">
        <section id="estrenos">
            <h2 class="section-title">ÚLTIMA MISIÓN</h2>
            <div id="estrenos-container"></div>
        </section>

        <section id="sala-seccion" style="margin-top: 60px;">
            <h2 class="section-title">SISTEMA DE SALAS</h2>
            <div id="sala-container" class="card-sala">
                </div>
        </section>

        <section id="hall-fama" style="margin-top: 60px;">
            <h2 class="section-title">HALL DE LA FAMA</h2>
            <div id="hall-container" class="grid-hall"></div>
        </section>

        <div style="text-align: center; margin-top: 60px;">
            <a href="#" id="whatsapp-btn" class="btn-ws">HABLAR CON EL MANDO</a>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY COMPANY | HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        header { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), #000), url('https://wallpaperaccess.com/full/2105128.jpg') center/cover; border-bottom: 4px solid var(--gold); }
        h1 { font-family: 'Black Ops One', cursive; color: var(--gold); font-size: clamp(2rem, 10vw, 4rem); text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 5px; border-top: 3px solid var(--gold); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .hall-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .player { text-align: center; background: #000; padding: 15px; border: 1px solid #222; }
        .player img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .btn { display: block; text-align: center; padding: 15px; background: var(--gold); color: black; font-weight: bold; text-decoration: none; font-family: 'Black Ops One'; margin-top: 15px; }
        .tag { display: inline-block; padding: 5px 10px; background: #c00; font-weight: bold; font-size: 0.7rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header><h1>EASY COMPANY</h1></header>

    <main class="container">
        <div class="grid">
            <div class="card">
                <h2 style="font-family:'Black Ops One'; color:var(--gold)">NOTICIAS CODM</h2>
                <p>Mantente al tanto de las actualizaciones oficiales del despliegue.</p>
                <a id="n_link" href="#" target="_blank" class="btn">VER OFICIAL</a>
            </div>

            <div class="card">
                <span id="t_tag" class="tag"></span>
                <h2 style="font-family:'Black Ops One'; color:var(--gold)" id="t_tit">CARGANDO...</h2>
                <p id="t_det"></p>
                <a id="ws_link" href="#" class="btn">INSCRIBIRSE</a>
            </div>
        </div>

        <div class="card" style="margin-top:20px; text-align:center;">
            <h2 style="font-family:'Black Ops One'; color:var(--gold)">SÍGUENOS EN TIKTOK</h2>
            <a id="tk_link" href="#" target="_blank" class="btn" style="background:#ff0050; color:white;">VER VIDEOS</a>
        </div>

        <h2 style="font-family:'Black Ops One'; color:var(--gold); margin-top:40px;">HALL DE LA FAMA</h2>
        <div id="hall" class="hall-grid"></div>
    </main>

    <script>
        async function init() {
            try {
                const r = await fetch('data.json?v=' + Date.now());
                const d = await r.json();

                document.getElementById('n_link').href = d.noticias_url;
                document.getElementById('t_tit').innerText = d.torneo.titulo;
                document.getElementById('t_det').innerText = d.torneo.detalles;
                document.getElementById('t_tag').innerText = d.torneo.costo;
                document.getElementById('tk_link').href = d.tiktok_url;
                document.getElementById('ws_link').href = `https://wa.me/${d.whatsapp}?text=Hola!%20Deseo%20inscribirme%20al%20torneo.`;

                document.getElementById('hall').innerHTML = d.hall_fama.map(p => `
                    <div class="player">
                        <img src="${p.foto}" onerror="this.src='https://via.placeholder.com/150'">
                        <div style="color:var(--gold); font-family:'Black Ops One'; font-size:0.8rem; margin-top:10px;">${p.nombre}</div>
                    </div>
                `).join('');
            } catch (e) { console.error("Error cargando sistema operativo."); }
        }
        init();
    </script>
    <footer style="margin-top: 50px; text-align: center; padding: 20px; border-top: 1px solid #222;">
    <a href="admin.html" style="color: #333; text-decoration: none; font-size: 0.7rem;">[ ACCESO RESTRINGIDO ]</a>
    </footer>
</body>
</html>
